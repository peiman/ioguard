[[rules]]
id = "bidi.control_char"
category = "bidi"
severity = "block"
direction = "both"
pattern = "BUILTIN"
description = "Bidirectional control characters (U+202A-202E, U+2066-2069, U+200E, U+200F) — may be used to spoof displayed text direction. Exempted when locale is RTL."
detect_mode = "builtin"
