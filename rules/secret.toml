[[rules]]
id = "secret.pem_private_key"
category = "secret"
severity = "block"
direction = "both"
# Structural anchor: matches ANY PEM-armored private key regardless of the label.
# Per the spec, the PEM label (the text between BEGIN and PRIVATE KEY) is
# attacker-controlled cosmetic metadata — the base64 body is the real key
# material. A fixed-label enumeration (round-4 regression) allowed FOO/X25519/
# ED25519/SM2/SSH2 and any future key type to bypass detection.
#
# Pattern breakdown:
#   (?i) — case-insensitive flag to catch mixed/lowercase labels (e.g. "Rsa", "rsa")
#   [A-Za-z0-9 ]* — any label (RSA, EC, DSA, OPENSSH, ENCRYPTED, FOO, X25519, ...)
#   PRIVATE KEY — the canonical suffix required by RFC 7468 and OpenSSL
#   (?:\s+BLOCK)? — optional suffix for PGP PRIVATE KEY BLOCK armor
#
# The no-FP guard: "-----BEGIN OUR COMPANY PRIVATE KEY POLICY DOCUMENT-----"
# does NOT match because after "PRIVATE KEY" the regex requires either
# optional " BLOCK" and then "-----", but " POLICY DOCUMENT-----" provides
# neither BLOCK nor the bare "-----" immediately after KEY.
pattern = '(?i)-----BEGIN [A-Za-z0-9 \t\r\n-]*PRIVATE[\s-]+KEY(?:\s+BLOCK)?-----'
description = "PEM-encoded private key (any label, case-insensitive)"

[[rules]]
id = "secret.card_pan"
category = "secret"
severity = "block"
direction = "both"
# Two-branch pattern:
#   15-digit branch: IIN 34/37 only (Amex) to avoid IMEI collisions (most IMEIs start 35/86)
#   16-digit branch: IIN 3-6 (Visa, Mastercard, Discover, etc.)
# Prior over-breadth {1,7} accepted 13-19-digit numbers; narrowed to spec (PAN = IIN + 4-4-4-4).
#
# NOTE: \b word-boundary anchors are intentionally ABSENT here.
# \b only fires between \w (word: [a-zA-Z0-9_]) and \W (non-word). A letter-to-digit
# transition (e.g. "card4111...") is \w→\w, so \b does NOT fire and the PAN is silently
# skipped. Boundary enforcement is done in Rust code (secret.rs): a match is suppressed
# only if the char immediately before/after the span is an ASCII digit (longer digit run).
# Adjacent letters, underscores, and punctuation are accepted as valid boundaries.
pattern = '(?:3[47][0-9]{2}[\s._/-]?[0-9]{4}[\s._/-]?[0-9]{4}[\s._/-]?[0-9]{3}|[3-6][0-9]{3}[\s._/-]?[0-9]{4}[\s._/-]?[0-9]{4}[\s._/-]?[0-9]{4})'
description = "Payment card number (IIN prefix + Luhn)"
luhn_validate = true
allowlist = [
    "4242424242424242",
    "4242 4242 4242 4242",
    "378282246310005",
    "3782 822463 10005",
    "5555555555554444",
    "4012888888881881",
    "6011000990139424",
    "4000056655665556",
]

[[rules]]
id = "secret.slack_token"
category = "secret"
severity = "block"
direction = "both"
# Slack token families (from gitleaks slack-access-token rule):
#   xoxb- (bot token)
#   xoxp- (user/legacy OAuth token)
#   xoxa- (workspace OAuth access token)
#   xoxr- (OAuth refresh token)
#   xoxs- (legacy session token)
#   xapp- (app-level token, distinct prefix)
# All have distinctive fixed prefixes with negligible FP rate.
# Widened from xox[bp] to xox[baprs] to cover the full Slack token family.
pattern = '(?:xox[baprs]-[0-9A-Za-z][-0-9A-Za-z]{8,}|xapp-[0-9A-Za-z][-0-9A-Za-z]{8,})'
description = "Slack API token (bot, user, workspace, refresh, session, or app)"

[[rules]]
id = "secret.gcp_api_key"
category = "secret"
severity = "block"
direction = "both"
# Google/GCP API key: fixed AIza prefix, always 39 chars total.
# Distinctive prefix → ~0 FP. From gitleaks gcp-api-key rule.
pattern = 'AIza[0-9A-Za-z_-]{35}'
description = "Google/GCP API key"

[[rules]]
id = "secret.google_oauth_secret"
category = "secret"
severity = "block"
direction = "both"
# Google OAuth 2.0 client secret: GOCSPX- prefix + 28 chars.
# From gitleaks google-oauth-client-secret rule.
pattern = 'GOCSPX-[0-9A-Za-z_-]{28}'
description = "Google OAuth 2.0 client secret"

[[rules]]
id = "secret.npm_access_token"
category = "secret"
severity = "block"
direction = "both"
# npm access token: npm_ prefix + 36 alphanumeric chars.
# From gitleaks npm-access-token rule.
pattern = 'npm_[A-Za-z0-9]{36}'
description = "npm access token"

[[rules]]
id = "secret.sendgrid_api_key"
category = "secret"
severity = "block"
direction = "both"
# SendGrid API key: SG. prefix + base64url segment + dot + base64url segment.
# Hard SG. anchor = ~0 FP. From gitleaks sendgrid-api-token rule.
pattern = 'SG\.[A-Za-z0-9_-]{22}\.[A-Za-z0-9_-]{43}'
description = "SendGrid API key"

[[rules]]
id = "secret.stripe_webhook_secret"
category = "secret"
severity = "block"
direction = "both"
# Stripe webhook signing secret: whsec_ prefix + 24+ alphanumeric chars.
# Extends the existing Stripe family (sk_live_, rk_live_).
pattern = 'whsec_[A-Za-z0-9]{24,}'
description = "Stripe webhook signing secret"

[[rules]]
id = "secret.gitlab_pat"
category = "secret"
severity = "block"
direction = "both"
# GitLab personal access token: glpat- prefix + 20 alphanumeric/dash/underscore chars.
# From gitleaks gitlab-pat rule.
pattern = 'glpat-[0-9A-Za-z_-]{20}'
description = "GitLab personal access token"

[[rules]]
id = "secret.gitlab_runner_auth_token"
category = "secret"
severity = "block"
direction = "both"
# GitLab runner authentication token: glrt- prefix + 20 alphanumeric/dash/underscore chars.
# From gitleaks gitlab-runner-auth-token rule.
# Covers the t1_ infix variant (e.g. glrt-t1_abcdefghij1234567890) via the
# [0-9A-Za-z_-] char class which allows underscores.
# Minimum 20 chars after prefix to match the token format.
pattern = 'glrt-[0-9A-Za-z_-]{20}'
description = "GitLab runner authentication token"

# ── Deferred to v1.1: generic high-entropy hex bearer token ─────────
#
# SPEC line 43 commits a "generic 40-64 hex/base64 bearer w/ length gate"
# sub-rule. Implementation is deferred because zero false-positives cannot
# be achieved for the 40-char hex range:
#
#   Git SHAs are 40-char hex strings produced by SHA-1 (a cryptographic
#   hash). They have Shannon entropy ~4.0 bits/char — indistinguishable
#   from a 40-char API secret. The existing test `ignores_git_sha` in
#   secret.rs explicitly asserts bare 40-hex must NOT match. No entropy
#   threshold can separate them.
#
# Options considered and rejected:
#   1. Entropy gate on 40-64 chars: FP on git SHAs (high-entropy hex).
#   2. Contextual cue for 40-char (Bearer/token= prefix): misses bare
#      40-char secrets in config files; partial coverage creates false
#      confidence.
#   3. Match only 41-64 chars: deviates from spec, still incomplete.
#
# v1.1 plan: implement a Shannon-entropy gate in secret.rs with:
#   - New TOML field `entropy_threshold: f64`
#   - For length 40: require contextual cue (Authorization:/Bearer/token=)
#     OR exclude entirely (treat all bare 40-hex as potential git SHAs)
#   - For length 41-64: entropy gate >= 3.5 bits/char
#   - Allowlist for UUIDs (32 hex + dashes), low-entropy repeats
