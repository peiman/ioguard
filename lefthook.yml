# Git hooks — automated enforcement (CKSPEC-ENF-001)
pre-commit:
  parallel: true
  commands:
    fmt:
      run: cargo fmt --all -- --check
      fail_text: "Code not formatted. Run: cargo fmt --all"
    clippy:
      # SSOT: run the framework's hardened clippy recipe (security/correctness
      # lints + -D warnings) so pre-commit and `just check` enforce the same set.
      run: just ckeletin-clippy
      fail_text: "Clippy warnings found. Run: cargo clippy --fix"
    gitleaks:
      # Staged-only secret scan (fast). Skips cleanly when gitleaks is not
      # installed (so it never blocks contributors without it — CI is the hard
      # gate) but FAILS when an actual secret is staged. Install: brew install gitleaks
      run: if command -v gitleaks >/dev/null 2>&1; then gitleaks git --pre-commit --staged --redact --no-banner --config .ckeletin/configs/gitleaks.toml; else echo "gitleaks not installed — skipping (CI gates this)"; fi
      fail_text: "Secret detected in staged changes. Remove it or allowlist via #gitleaks:allow."

commit-msg:
  commands:
    conventional:
      run: |
        MSG=$(cat {1})
        if ! echo "$MSG" | grep -qE "^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .+"; then
          echo "Commit message must follow Conventional Commits format"
          echo "Examples: feat: add ping command, fix: handle empty config"
          exit 1
        fi
